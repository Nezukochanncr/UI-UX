<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlowApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Poppins',sans-serif; margin:0;
           background:linear-gradient(90deg,#94b9ff,#e894ff); }
    header { color:white; padding:15px; text-align:center; font-size:20px; font-weight:600; }
    .hidden { display:none; }
    .tasks,.calendar,.profile { padding:20px; }
    .task { background:white; margin-bottom:10px; padding:10px; border-radius:6px;
            display:flex; justify-content:space-between; align-items:center; }
    .actions button { margin-left:5px; }
    nav { position:fixed; bottom:0; width:100%; background:#fff; display:flex;
          justify-content:space-around; padding:10px 0; border-top:1px solid #ccc; }
    nav button { border:none; background:none; font-size:14px; cursor:pointer; }
    .plus-btn { background:#4CAF50; color:white; border-radius:50%; width:40px; height:40px;
                font-size:24px; line-height:40px; }
    .avatar { width:80px; height:80px; border-radius:50%; background:#ccc; margin:auto; }
    .menu-item { background:white; padding:15px; margin:5px; border-radius:6px; cursor:pointer; }
    .nav-btn { margin:5px; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; }
    .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:10px; }
    .month-grid div { background:white; padding:10px; border-radius:4px; text-align:center; cursor:pointer; }
    .yellow { background:#fff59d; } /* malayo pa */
    .red { background:#ef9a9a; }    /* malapit na */
    .green { background:#a5d6a7; }  /* tapos na */
  </style>
</head>
<body>
  <header id="header">Good Morning, Nezuko chan!</header>

  <!-- Dashboard -->
  <div id="dashboard" class="tasks">
    <h2>MY TASK</h2>
    <div class="task"><span>Do assignment (Deadline: Apr 20)</span></div>
    <div class="task"><span>UI Project (Deadline: Apr 22)</span></div>
    <div class="task"><span>Study for exam (Deadline: Apr 25)</span></div>
  </div>

  <!-- Calendar -->
  <div id="calendar" class="calendar hidden">
    <h2 id="month-title"></h2>
    <div id="month-grid" class="month-grid"></div>
    <button class="nav-btn" onclick="showDashboard()">Back</button>
    <button class="nav-btn" onclick="showYear()">2026</button>
  </div>

  <!-- Year view -->
  <div id="year" class="calendar hidden">
    <h2>Year 2026</h2>
    <div id="year-grid"></div>
    <button class="nav-btn" onclick="showCalendar()">Back</button>
    <button class="nav-btn" onclick="showToday()">Today</button>
  </div>

  <!-- Profile -->
  <div id="profile" class="profile hidden">
    <div class="avatar"></div>
    <h3>Nezuko Chan</h3>
    <p>Nezukoegmail.com</p>
    <div class="menu-item">Language ›</div>
    <div class="menu-item">About ›</div>
    <div class="menu-item">Terms & Conditions ›</div>
    <div class="menu-item">Forgot password ›</div>
    <div class="menu-item">Log out ›</div>
    <button class="nav-btn" onclick="showDashboard()">Back</button>
  </div>

  <!-- Navigation -->
  <nav>
    <button onclick="showCalendar()">Calendar</button>
    <button class="plus-btn" onclick="addTask()">+</button>
    <button onclick="showProfile()">Profile</button>
  </nav>

  <script>
    // Sample tasks with deadlines
    const tasks = [
      { title:"Do assignment", deadline:"2026-04-20", done:false },
      { title:"UI Project", deadline:"2026-04-22", done:false },
      { title:"Study for exam", deadline:"2026-04-25", done:true }
    ];

    function showDashboard() {
      hideAll(); document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('header').innerText = "Good Morning, Nezuko chan!";
    }
    function showCalendar() {
      hideAll(); document.getElementById('calendar').classList.remove('hidden');
      document.getElementById('header').innerText = "Calendar";
      generateMonth(2026,3); // April = month index 3
    }
    function showYear() {
      hideAll(); document.getElementById('year').classList.remove('hidden');
      document.getElementById('header').innerText = "Year 2026";
      generateYear(2026);
    }
    function showProfile() {
      hideAll(); document.getElementById('profile').classList.remove('hidden');
      document.getElementById('header').innerText = "Profile";
    }
    function showToday() { showCalendar(); }
    function hideAll() {
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('calendar').classList.add('hidden');
      document.getElementById('year').classList.add('hidden');
      document.getElementById('profile').classList.add('hidden');
    }
    function addTask() { alert("Add task clicked!"); }

    // Generate one month calendar
    function generateMonth(year, monthIndex) {
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      document.getElementById('month-title').innerText = monthNames[monthIndex]+" "+year;
      const grid = document.getElementById('month-grid');
      grid.innerHTML="";
      const firstDay = new Date(year,monthIndex,1).getDay();
      const daysInMonth = new Date(year,monthIndex+1,0).getDate();
      const weekDays = ["Su","Mo","Tu","We","Th","Fr","Sa"];
      weekDays.forEach(d => { let cell=document.createElement("div"); cell.innerHTML="<b>"+d+"</b>"; grid.appendChild(cell); });
      for(let j=0;j<firstDay;j++){ grid.appendChild(document.createElement("div")); }
      for(let d=1; d<=daysInMonth; d++){
        let cell=document.createElement("div"); cell.innerText=d;
        let dateStr=`${year}-${String(monthIndex+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        // check tasks
        tasks.forEach(t=>{
          if(t.deadline===dateStr){
            if(t.done){ cell.classList.add("green"); }
            else {
              let diff=(new Date(t.deadline)-new Date());
              if(diff>5*24*60*60*1000){ cell.classList.add("yellow"); }
              else { cell.classList.add("red"); }
            }
            cell.onclick=()=>alert("Task: "+t.title+" (Deadline: "+t.deadline+")");
          }
        });
        grid.appendChild(cell);
      }
    }

    // Generate full year
    function generateYear(year){
      const yearGrid=document.getElementById('year-grid');
      yearGrid.innerHTML="";
      const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
      months.forEach((m,i)=>{
        const div=document.createElement("div");
        div.innerHTML=`<h3>${m} ${year}</h3>`;
        yearGrid.appendChild(div);
      });
    }
  </script>
</body>
</html>
