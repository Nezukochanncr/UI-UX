<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlowApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Poppins',sans-serif; margin:0;
           background:linear-gradient(90deg,#94b9ff,#e894ff); }
    header { color:white; padding:15px; text-align:center; font-size:20px; font-weight:600; }
    .hidden { display:none; }
    .tasks,.calendar,.profile { padding:20px; }
    .task { background:white; margin-bottom:10px; padding:10px; border-radius:6px;
            display:flex; justify-content:space-between; align-items:center; }
    .actions button { margin-left:5px; }
    nav { position:fixed; bottom:0; width:100%; background:#fff; display:flex;
          justify-content:space-around; padding:10px 0; border-top:1px solid #ccc; }
    nav button { border:none; background:none; font-size:14px; cursor:pointer; }
    .plus-btn { background:linear-gradient(90deg,#94b9ff,#e894ff); color:white;
                border-radius:50%; width:40px; height:40px; font-size:24px; line-height:40px; border:none; }
    .avatar { width:80px; height:80px; border-radius:50%; background:#ccc; margin:auto; }
    .menu-item { background:white; padding:15px; margin:5px; border-radius:6px; cursor:pointer; }
    .nav-btn { margin:5px; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; }
    .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:10px; }
    .month-grid div { background:white; padding:10px; border-radius:4px; text-align:center; cursor:pointer; }
    .yellow { background:#fff59d; } /* malayo pa */
    .red { background:#ef9a9a; }    /* malapit na */
    .green { background:#a5d6a7; }  /* tapos na */
    #year-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    #year-grid div { background:white; padding:10px; border-radius:6px; }
    #year-grid h3 { margin:0; font-size:14px; }
  </style>
</head>
<body>
  <header id="header">Good Morning, Nezuko chan!</header>

  <!-- Dashboard -->
  <div id="dashboard" class="tasks">
    <h2>MY TASK</h2>
    <div class="task">
      <span>Do assignment (Deadline: Apr 20)</span>
      <div class="actions">
        <button onclick="editTask('Do assignment','Math homework','2026-04-20')">Edit</button>
        <button onclick="deleteTask('Do assignment')">Delete</button>
      </div>
    </div>
    <div class="task">
      <span>UI Project (Deadline: Apr 22)</span>
      <div class="actions">
        <button onclick="editTask('UI Project','Finish design in Canva','2026-04-22')">Edit</button>
        <button onclick="deleteTask('UI Project')">Delete</button>
      </div>
    </div>
    <div class="task">
      <span>Study for exam (Deadline: Apr 25)</span>
      <div class="actions">
        <button onclick="editTask('Study for exam','Review chapters 1-5','2026-04-25')">Edit</button>
        <button onclick="deleteTask('Study for exam')">Delete</button>
      </div>
    </div>
  </div>

  <!-- Calendar -->
  <div id="calendar" class="calendar hidden">
    <h2 id="month-title"></h2>
    <div id="month-grid" class="month-grid"></div>
    <button class="nav-btn" onclick="showDashboard()">Back</button>
    <button class="nav-btn" onclick="showYear()">2026</button>
  </div>

  <!-- Year view -->
  <div id="year" class="calendar hidden">
    <h2>Year 2026</h2>
    <div id="year-grid"></div>
    <button class="nav-btn" onclick="showCalendar()">Back</button>
    <button class="nav-btn" onclick="showToday()">Today</button>
  </div>

  <!-- Profile -->
  <div id="profile" class="profile hidden">
    <div class="avatar"></div>
    <h3>Nezuko Chan</h3>
    <p>Nezukoegmail.com</p>
    <div class="menu-item">Language ›</div>
    <div class="menu-item">About ›</div>
    <div class="menu-item">Terms & Conditions ›</div>
    <div class="menu-item">Forgot password ›</div>
    <div class="menu-item">Log out ›</div>
    <button class="nav-btn" onclick="showDashboard()">Back</button>
  </div>

  <!-- Add Task Form -->
  <div id="add-task" class="hidden" style="padding:20px;">
    <h2>Add Task</h2>
    <label>Task Name:</label><br>
    <input type="text" id="taskName" style="width:100%;padding:8px;margin:5px 0;"><br>
    <label>Description:</label><br>
    <textarea id="taskDesc" style="width:100%;padding:8px;margin:5px 0;"></textarea><br>
    <label>Date:</label><br>
    <input type="date" id="taskDate" style="width:100%;padding:8px;margin:5px 0;"><br>
